<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Links</title>
    <!-- Font Awesome for clean brand logos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        /* Rectangular Logo Constraints */
        .logo-container {
            width: 100%;
            max-height: 120px;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .logo-container img {
            max-width: 100%;
            max-height: 120px;
            object-fit: contain;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 30px;
            letter-spacing: 1px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        .links-stack {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
        }

        /* Flowing RGB Border Effect Container */
        .rgb-btn-wrap {
            position: relative;
            width: 100%;
            border-radius: 12px;
            padding: 3px; /* Size of the border */
            background: linear-gradient(0deg, #000, #000); /* Fallback */
            overflow: hidden;
            display: block;
            text-decoration: none;
            cursor: pointer;
        }

        /* Moving RGB gradient background */
        .rgb-btn-wrap::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(
                #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #9400d3, #ff0000
            );
            animation: spin 4s linear infinite;
            z-index: 1;
        }

        @keyframes spin {
            100% { transform: rotate(360deg); }
        }

        /* Inner Button content masks the spinning center */
        .rgb-btn-inner {
            position: relative;
            z-index: 2;
            background-color: #0d0d0d;
            color: #ffffff;
            padding: 16px 24px;
            border-radius: 9px; /* Slightly lower radius to match parent */
            display: flex;
            align-items: center;
            transition: background-color 0.3s;
        }

        .rgb-btn-wrap:hover .rgb-btn-inner {
            background-color: #151515;
        }

        .rgb-btn-inner i {
            font-size: 1.3rem;
            width: 30px;
            text-align: left;
        }

        /* Branding Colors for the Icons */
        .fa-youtube { color: #ff0000; }
        .fa-instagram { color: #e1306c; }
        .fa-facebook { color: #1877f2; }
        .fa-lightbulb { color: #ff9900; } /* Fallback icon for Instructables */

        .btn-text {
            flex-grow: 1;
            text-align: center;
            font-weight: 500;
            font-spacing: 0.5px;
        }

        .fa-chevron-down {
            font-size: 0.9rem !important;
            width: auto !important;
            transition: transform 0.3s ease;
        }

        /* Dropdown Specific Styles */
        .dropdown-container {
            width: 100%;
            position: relative;
        }

        .dropdown-menu {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-out;
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-top: 8px;
            padding: 0 5px;
        }

        .dropdown-container.active .dropdown-menu {
            max-height: 300px;
            overflow-y: auto;
        }

        .dropdown-container.active .fa-chevron-down {
            transform: rotate(180deg);
        }

        .video-item {
            background: #111;
            border: 1px solid #222;
            padding: 12px;
            border-radius: 8px;
            color: #ccc;
            text-decoration: none;
            text-align: left;
            font-size: 0.9rem;
            display: flex;
            flex-direction: column;
            gap: 4px;
            transition: all 0.2s;
        }

        .video-item:hover {
            background: #1c1c1c;
            color: #fff;
            border-color: #444;
        }

        .video-date {
            font-size: 0.75rem;
            color: #666;
        }

        /* Scrollbar styling for the dropdown list */
        .dropdown-menu::-webkit-scrollbar {
            width: 6px;
        }
        .dropdown-menu::-webkit-scrollbar-track {
            background: #000;
        }
        .dropdown-menu::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 3px;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- Rectangular Logo Section -->
        <div class="logo-container">
            <img src="https://via.placeholder.com/400x100?text=YOUR+LOGO" alt="Logo">
        </div>

        <!-- Title Heading -->
        <h1>Dr. Electronics</h1>

        <!-- Buttons Stack -->
        <div class="links-stack">

            <!-- Button 1: YouTube -->
            <a href="https://youtube.com" target="_blank" class="rgb-btn-wrap">
                <div class="rgb-btn-inner">
                    <i class="fab fa-youtube"></i>
                    <span class="btn-text">YouTube</span>
                </div>
            </a>

            <!-- Button 2: Instagram -->
            <a href="https://instagram.com" target="_blank" class="rgb-btn-wrap">
                <div class="rgb-btn-inner">
                    <i class="fab fa-instagram"></i>
                    <span class="btn-text">Instagram</span>
                </div>
            </a>

            <!-- Button 3: Facebook -->
            <a href="https://facebook.com" target="_blank" class="rgb-btn-wrap">
                <div class="rgb-btn-inner">
                    <i class="fab fa-facebook"></i>
                    <span class="btn-text">Facebook</span>
                </div>
            </a>

            <!-- Button 4: Instructables -->
            <a href="https://www.instructables.com" target="_blank" class="rgb-btn-wrap">
                <div class="rgb-btn-inner">
                    <i class="fas fa-lightbulb"></i>
                    <span class="btn-text">Instructables</span>
                </div>
            </a>

            <!-- Button 5: Dropdown Menu with Live Feed -->
            <div class="dropdown-container" id="yt-dropdown-container">
                <div class="rgb-btn-wrap" onclick="toggleDropdown()">
                    <div class="rgb-btn-inner">
                        <i class="fab fa-youtube"></i>
                        <span class="btn-text" id="dropdown-label">Latest Videos</span>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                </div>
                <div class="dropdown-menu" id="video-list">
                    <!-- Fetched video elements will append here dynamically -->
                    <div class="video-item" style="text-align:center;">Loading videos...</div>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Toggle the active state of the drop-down menu
        function toggleDropdown() {
            document.getElementById('yt-dropdown-container').classList.toggle('active');
        }

        // Fetch YouTube videos via public RSS feed converted to JSON
        async function fetchLatestVideos() {
            // REPLACE THIS CHANNEL ID WITH YOUR ACTUAL YOUTUBE CHANNEL ID
            const channelId = 'UCeYK_1_l_u_6T6bM6mH25wA'; 
            const rssUrl = `https://www.youtube.com/feeds/videos.xml?channel_id=${channelId}`;
            
            // Using a free, reliable open-source feed parser proxy for client-side execution
            const rss2jsonApi = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}`;

            const container = document.getElementById('video-list');

            try {
                const response = await fetch(rss2jsonApi);
                const data = await response.json();

                if (data.status === 'ok' && data.items.length > 0) {
                    container.innerHTML = ''; // Wipe loading message

                    // RSS2JSON naturally returns them sorted by release date descending
                    data.items.forEach(video => {
                        const videoLink = video.link;
                        const videoTitle = video.title;
                        
                        // Human-friendly date formatting
                        const pubDate = new Date(video.pubDate);
                        const formattedDate = pubDate.toLocaleDateString(undefined, { 
                            year: 'numeric', 
                            month: 'short', 
                            day: 'numeric' 
                        });

                        const itemHtml = `
                            <a href="${videoLink}" target="_blank" class="video-item">
                                <span>${videoTitle}</span>
                                <span class="video-date">Released: ${formattedDate}</span>
                            </a>
                        `;
                        container.innerHTML += itemHtml;
                    });
                } else {
                    container.innerHTML = '<div class="video-item" style="text-align:center;">No videos found.</div>';
                }
            } catch (error) {
                console.error('Error fetching YouTube RSS feed:', error);
                container.innerHTML = '<div class="video-item" style="text-align:center; color:#ff4444;">Failed to load videos.</div>';
            }
        }

        // Initialize fetching on page load
        window.onload = fetchLatestVideos;
    </script>
</body>
</html>
